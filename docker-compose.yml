version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: campus-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: campus_marketplace
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7.2-alpine
    container_name: campus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data: